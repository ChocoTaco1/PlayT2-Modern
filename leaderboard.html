<!DOCTYPE html>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #090912;
      color: #c8c8d8;
      font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      gap: 20px;
    }
    h1 {
      color: #0befe7;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .subtitle {
      color: #4a4a7a;
      font-size: 13px;
      letter-spacing: 1px;
    }
    #dropzone {
      width: 100%;
      max-width: 860px;
      height: 140px;
      border: 2px dashed #1a1a40;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: rgba(11, 239, 231, 0.02);
      position: relative;
      user-select: none;
    }
    #dropzone.drag-over {
      background: rgba(11, 239, 231, 0.07);
      border-color: #0befe7;
    }
    #dropzone-label {
      color: #0befe7;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
      pointer-events: none;
    }
    #dropzone-sub {
      color: #3a3a60;
      font-size: 12px;
      margin-top: 8px;
      pointer-events: none;
    }
    #fileInput {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    #controls {
      display: none;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }
    #controls.visible { display: flex; }
    button {
      background: #0befe7;
      color: #06060f;
      border: none;
      padding: 9px 22px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.15s;
    }
    button:hover { background: #03d597; }
    #status {
      color: #4a4a7a;
      font-size: 12px;
      letter-spacing: 0.5px;
    }
    #canvasWrap {
      width: 100%;
      overflow-x: auto;
      display: flex;
      justify-content: center;
    }
    canvas {
      display: block;
      max-width: 100%;
      border: 1px solid #111128;
      /* Scale down for display while keeping full resolution for download */
      transform-origin: top left;
    }
  </style>
</head>
<body>

    <button id="downloadBtn">⬇ Download PNG</button>
    <span id="status"></span>

// ─── File parsing ─────────────────────────────────────────────────────────────

function splitLine(line) {
  return line.split('%t');
}

function detectType(filename) {
  const f = filename.replace(/\\/g, '/').split('/').pop();
  if (/g\.cs$/i.test(f)) return 'gmData';
  if (/t\.cs$/i.test(f)) return 'lData';
  return 'unknown';
}

function parseTcsDate(dateStr) {
  // T.cs date format: 'DD MM YYYY HH MM'  (day month year hour minute)
  const p = dateStr.trim().split(/\s+/);
  if (p.length >= 3) {
    const day   = parseInt(p[0], 10);
    const mon   = parseInt(p[1], 10);
    const year  = p[2];
    const hour  = p[3] !== undefined ? p[3] : '';
    const min   = p[4] !== undefined ? String(p[4]).padStart(2, '0') : '';
    const mname = (mon >= 1 && mon <= 12) ? MONTH_NAMES[mon - 1] : String(mon);
    return `${mname} ${day}, ${year}${hour ? ` ${hour}:${min}` : ''}`;
  }
  return dateStr;
}

function parseLData(content, filename) {
  const base  = filename.replace(/\.cs$/i, '');
  const parts = base.split('-').filter(p => p.trim() !== '');

  // Detect T.cs files: last segment is 'T' (e.g. '-CTFGame-04 04 2026 1 16-T.cs')
  // vs lData files:    '-CTFGame-1-2026-month-.cs'
  let meta;
  if (parts.length >= 2 && /^T$/i.test(parts[parts.length - 1])) {
    // T.cs single-game result: segments are [gameType, 'DD MM YYYY HH MM', 'T']
    const dateRaw = parts.slice(1, -1).join('-');
    meta = {
      gameType: parts[0] || 'CTFGame',
      dateStr:  parseTcsDate(dateRaw),
      lType:    'tcs',
    };
  } else {
    // lData aggregate: [gameType, mon, year, lType]
    meta = {
      gameType: parts[0] || 'CTFGame',
      mon:      parts[1] || '1',
      year:     parts[2] || '2026',
      lType:    parts[3] || 'month',
    };
  }

  const stats = {};
  for (const rawLine of content.split('\n')) {
    const line = rawLine.trim();
    if (!line) continue;
    const fields = splitLine(line);
    if (fields.length < 3) continue;

    // Two tab-separated formats exist:
    //   lData : statKey %t (name|data|guid) %t values…   → fields[0] = stat key
    //   T.cs  : (name|data|guid) %t statKey %t values…   → fields[0] = type keyword
    let statKey, dataType, values;
    if (fields[0] === 'name' || fields[0] === 'data' || fields[0] === 'guid') {
      dataType = fields[0];
      statKey  = fields[1];
      values   = fields.slice(2);
    } else {
      statKey  = fields[0];
      dataType = fields[1];
      values   = fields.slice(2);
    }

    if (dataType === 'guid') continue;
    if (!stats[statKey]) stats[statKey] = {};
    stats[statKey][dataType] = values.filter(v => v.trim() !== '');
  }
  return { meta, stats };
}

function parseGmData(content) {
  const lines = content.split('\n');
  if (!lines.length) return null;

  const hf = splitLine(lines[0].trim());
  const header = {
    mapName:   hf[0] || '',
    gameType:  hf[1] || 'CTFGame',
    timestamp: hf[2] || '',
    date:      hf[3] || '',
    score:     hf[4] || '0 0',
  };

  const scoreboard = {};   // [teamNum] = { name:[], score:[], off:[], def:[], kills:[] }
  const statData   = {};   // [statKey][teamNum] = { name:[], data:[], team:[] }

  const scoreboardKeys = new Set(['score', 'off', 'def', 'kills']);
  const statSuffix = /TG$|Max$|Avg$|Min$|MinI$|AvgI$/;

  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const fields = splitLine(line);
    if (fields.length < 3) continue;

    const teamNum = parseInt(fields[0]);
    if (isNaN(teamNum)) continue;
    const key   = fields[1];
    const third = fields[2];

    const isStatBreakdown = statSuffix.test(third);

    if (!isStatBreakdown && key === 'name') {
      if (!scoreboard[teamNum]) scoreboard[teamNum] = {};
      scoreboard[teamNum].name = fields.slice(2);
    } else if (!isStatBreakdown && scoreboardKeys.has(key)) {
      if (!scoreboard[teamNum]) scoreboard[teamNum] = {};
      scoreboard[teamNum][key] = fields.slice(2);
    } else if (isStatBreakdown) {
      const sk = third;
      if (!statData[sk])           statData[sk] = {};
      if (!statData[sk][teamNum])  statData[sk][teamNum] = {};
      if (key === 'name') {
        statData[sk][teamNum].name = fields.slice(3);
      } else if (key === 'data') {
        statData[sk][teamNum].data = fields.slice(3);
      } else if (key === 'team') {
        statData[sk][teamNum].team = fields.slice(3).map(Number);
      }
    }
  }
  return { header, scoreboard, statData };
}

// ─── Background rendering ─────────────────────────────────────────────────────

function lerp255(a, b, t) {
  return Math.floor(a + (b - a) * (t < 0 ? 0 : t > 1 ? 1 : t));
}

// imgCycle background – matches the script exactly
function renderBgLData(ctx, W, H) {
  const d = ctx.createImageData(W, H).data;
  // use a separate buffer for speed
  const buf = new Uint8ClampedArray(W * H * 4);

  const PX_SMALL = 161, PY = 330, PX_BIG = 483;
  const BORDER = 45, HDR = 42;
  let py = 0;

  for (let y = 0; y < H; y++) {
    if (y > BORDER + HDR + 3 && py < H - 124) py++;

    const yc = y - 5;
    const tO = Math.min(1, (y / H) * 1.5);
    const tI = (y / H) * 0.25;

    // Outer border lerp colours for this row
    const rO = lerp255(32, 0, tO), gO = lerp255(60, 118, tO), bO = lerp255(69, 118, tO);
    // Inner border lerp colours for this row
    const rI = lerp255(0, 32, tI), gI = lerp255(150, 60, tI), bI = lerp255(160, 69, tI);

    // Pre-compute which y-ranges apply
    const outerLR_y  = yc >= 17 && yc <= H - 17;
    const outerTB    = (yc >= 17 && yc <= 37) || (yc >= H - 37 && yc <= H - 17);
    const innerLR_y  = yc >= 37 && yc <= H - 37;
    const innerTB    = (yc >= 37 && yc <= 41) || (yc >= H - 41 && yc <= H - 37);
    const hdrBand    = y > BORDER && (y - BORDER) < HDR;

    let px = 0;

    for (let x = 0; x < W; x++) {
      let r = 20, g = 45, b = 45;
      const xc = x - 1;

      // Outer border ring (offset 22/17, borderSize 20)
      if ((outerTB && xc >= 22 && xc <= W - 22) ||
          (outerLR_y && ((xc >= 22 && xc <= 42) || (xc >= W - 42 && xc <= W - 22)))) {
        r = rO; g = gO; b = bO;
      }
      // Inner border ring (offset 42/37, borderSize 4)
      if ((innerTB && xc >= 42 && xc <= W - 42) ||
          (innerLR_y && ((xc >= 42 && xc <= 46) || (xc >= W - 46 && xc <= W - 42)))) {
        r = rI; g = gI; b = bI;
      }
      // Content panel area
      if (x > BORDER && y > BORDER && px < W - 88) {
        px++;
        if (px > 2 && x < 1816) {
          if (hdrBand) {
            r = 33; g = 87; b = 97;
          } else {
            const pxMod = px > 484 ? (px % PX_SMALL) : (px % PX_BIG);
            if (pxMod > 2 && (py % PY) > 2) { r = 33; g = 87; b = 97; }
          }
        }
      }
      const idx = (y * W + x) << 2;
      buf[idx] = r; buf[idx + 1] = g; buf[idx + 2] = b; buf[idx + 3] = 255;
    }
  }
  const imgData = new ImageData(buf, W, H);
  ctx.putImageData(imgData, 0, 0);
}

// pugImgCycle2 background – matches the script exactly
function renderBgGmData(ctx, W, H) {
  const buf = new Uint8ClampedArray(W * H * 4);
  const halfW = Math.round((48 + W - 45) / 2); // centre of content area (x=48..W-45)

  for (let y = 0; y < H; y++) {
    const yc = y - 5;
    const tO = Math.min(1, (y / H) * 1.5);
    const tI = (y / H) * 0.25;

    const rO = lerp255(20, 0, tO), gO = lerp255(45, 118, tO), bO = lerp255(45, 118, tO);
    const rI = lerp255(0, 20, tI), gI = lerp255(150, 45, tI), bI = lerp255(160, 45, tI);

    const outerLR_y = yc >= 21 && yc <= H - 21;
    const outerTB   = (yc >= 21 && yc <= 36) || (yc >= H - 36 && yc <= H - 21);
    const innerLR_y = yc >= 37 && yc <= H - 37;
    const innerTB   = (yc >= 37 && yc <= 41) || (yc >= H - 41 && yc <= H - 37);

    for (let x = 0; x < W; x++) {
      let r, g, b;
      // Content fill
      if (x >= 48 && x <= W - 45 && y >= 47 && y <= H - 20) {
        if (x >= halfW && y < 780)      { r = 33; g = 86; b = 96; }
        else if (x <= halfW && y < 780) { r = 29; g = 74; b = 82; }
        else                            { r = 21; g = 55; b = 61; }
      } else { r = 20; g = 45; b = 45; }

      const xc = x - 1;
      // Outer border ring (offset 26/21, borderSize 15)
      if ((outerTB && xc >= 26 && xc <= W - 26) ||
          (outerLR_y && ((xc >= 26 && xc <= 41) || (xc >= W - 41 && xc <= W - 26)))) {
        r = rO; g = gO; b = bO;
      }
      // Inner border ring (offset 42/37, borderSize 4)
      if ((innerTB && xc >= 42 && xc <= W - 42) ||
          (innerLR_y && ((xc >= 42 && xc <= 46) || (xc >= W - 46 && xc <= W - 42)))) {
        r = rI; g = gI; b = bI;
      }
      const idx = (y * W + x) << 2;
      buf[idx] = r; buf[idx + 1] = g; buf[idx + 2] = b; buf[idx + 3] = 255;
    }
  }
  ctx.putImageData(new ImageData(buf, W, H), 0, 0);
}

// ─── Text helpers ─────────────────────────────────────────────────────────────

const FONT = (size) => `${size}px 'Roboto Condensed','Arial Narrow',sans-serif`;

function glText(ctx, text, x, y, color, size, maxW) {
  ctx.fillStyle = color;
  ctx.font = FONT(size);
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';
  const s = String(text ?? '');
  if (maxW !== undefined) ctx.fillText(s, x, y, maxW);
  else ctx.fillText(s, x, y);
}

// Render text and return the pixel width it occupied
function glInline(ctx, text, x, y, color, size, maxW) {
  ctx.fillStyle = color;
  ctx.font = FONT(size);
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';
  const s = String(text ?? '');
  if (maxW !== undefined) ctx.fillText(s, x, y, maxW);
  else ctx.fillText(s, x, y);
  return ctx.measureText(s).width;
}

// Format a value: if it parses as a float with a fractional part, round to 1 decimal.
function fmtVal(v) {
  if (v === null || v === undefined || v === '') return '';
  const s = String(v).trim();
  const n = parseFloat(s);
  if (isNaN(n) || !s.includes('.')) return s;
  return n.toFixed(1);
}

// ─── Data accessor helpers ─────────────────────────────────────────────────────

function topName(stats, key) {
  const s = stats && stats[key];
  if (!s || !s.name || !s.name.length || s.name[0] === 'NA') return '';
  return s.name[0] || '';
}

function gmTopName(statData, key, team) {
  const d = statData && statData[key] && statData[key][team];
  if (!d || !d.name || !d.name.length || d.name[0] === 'NA') return '';
  return d.name[0] || '';
}

function gmTopVal(statData, key, team) {
  const d = statData && statData[key] && statData[key][team];
  if (!d || !d.data || !d.data.length) return '';
  return d.data[0] || '';
}

// ─── lData rendering ──────────────────────────────────────────────────────────

function renderLData(ctx, { meta, stats }) {
  const { gameType, mon, year, lType, dateStr } = meta;
  const W = CW_LDATA, H = CH;
  const SZ = 15, XO = 52, YO = 76;

  // ── Background ──
  renderBgLData(ctx, W, H);

  // ── Header (centred, 30px) ──
  const gtName = GAME_TYPE_LABELS[gameType] || gameType;
  let hdr;
  if (lType === 'tcs') {
    // Single-game T.cs result: show game type + parsed date
    hdr = `${gtName} - ${dateStr || ''}`;
  } else {
    const monNum    = parseInt(mon, 10);
    const monthName = (monNum >= 1 && monNum <= 12) ? MONTH_NAMES[monNum - 1] : mon;
    hdr = lType === 'month'
      ? `${gtName} - ${monthName} ${year}`
      : `${gtName} - ${mon}`;
  }

  ctx.font = FONT(30);
  ctx.fillStyle = CYAN;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(hdr, W / 2, 50);
  ctx.textAlign = 'left';

  // Resolve game type for panel lookups (fall back to DefaultGame)
  const game = (SMALL_PANELS[gameType] ? gameType : 'DefaultGame');

  // ── Score / Kills panels (panel row 0, y=76..405) ──
  glText(ctx, '#. Score', XO,         20 + YO, CYAN, SZ);
  glText(ctx, 'Total',    160 + XO,   20 + YO, CYAN, SZ);
  glText(ctx, 'Kills',    240 + XO,   20 + YO, CYAN, SZ);
  glText(ctx, 'Total',    400 + XO,   20 + YO, CYAN, SZ);

  for (let x = 0; x < 2; x++) {
    const key   = x === 0 ? 'scoreTG' : 'killsTG';
    const s     = stats[key] || {};
    const names = s.name || [], vals = s.data || [];
    for (let i = 0; i < Math.min(15, names.length); i++) {
      const ry = 20 * (i + 2) + YO;
      glText(ctx, `${i + 1}. ${names[i] || ''}`, XO + x * 240, ry, CYAN, SZ, 150);
      glText(ctx, fmtVal(vals[i]),                160 + XO + x * 240, ry, TEAL, SZ);
    }
  }

  // ── Upper weapon panel (panel row 1, y=406..735) ──
  // The script reads r starting at -1, so the first cell (r=-1) is blank.
  // UPPER_WEP_PANELS[game] already encodes this with '' at index 0.
  const uwp = UPPER_WEP_PANELS[game] || [];
  // uwpCount = floor(panelCount/3) – computed from array length (CTFGame/DefaultGame=3, LCTFGame/SCtFGame/LakRabbitGame=7, ArenaGame=4)
  const uwpCount = Math.floor(uwp.length / 3);
  let r = 0; // index into uwp array
  for (let xc = 0; xc < 3; xc++) {
    for (let i = 0; i < uwpCount; i++, r++) {
      const varname = uwp[r] || '';
      const ry = (19 * (i + 1) + YO) + 330;
      if (varname) {
        const label = (STAT_LABEL[varname] || varname) + ': ';
        const pw = glInline(ctx, label, XO + xc * 160, ry, CYAN, SZ, 500);
        glText(ctx, fmtVal(topName(stats, varname)) || 'NA', XO + xc * 160 + pw, ry, TEAL, SZ, Math.max(5, 155 - pw));
      }
    }
  }

  // ── Weapon column headers + grid ──
  // After the 3×3 upper panel loop, i=3 (the %i after the loop in the script)
  const wepDef = WEAPON_GRID[game] || WEAPON_GRID.DefaultGame;
  const wepHdrY = (19 * (uwpCount + 1) + YO) + 330; // i=3 in script
  const TS = 95; // tabspace

  glText(ctx, 'Weapon',           XO,         wepHdrY, CYAN, SZ);
  (wepDef.headers || []).forEach((h, ci) => glText(ctx, h, TS * (ci + 1) + XO, wepHdrY, CYAN, SZ));

  wepDef.weapons.forEach((wep, wi) => {
    const ry = (19 * (uwpCount + 2 + wi) + YO) + 330;
    glText(ctx, wep.name, XO, ry, CYAN, SZ, 90);
    (wep.cols || []).forEach((sk, ci) => glText(ctx, fmtVal(topName(stats, sk)), TS * (ci + 1) + XO, ry, TEAL, SZ, 90));
  });

  // ── panelThree (panel row 2, y=736..1115) ──
  const p3 = PANEL_THREE[game] || [];
  const p3Rows = Math.floor(p3.length / 3);
  let pr = 0;
  for (let i = 0; i < p3Rows; i++) {
    for (let xc = 0; xc < 3; xc++, pr++) {
      const varname = p3[pr] || '';
      const ry = (20 * (i + 1) + YO) + 2 * 330;
      if (varname) {
        const label = (STAT_LABEL[varname] || varname) + ': ';
        const pw = glInline(ctx, label, XO + xc * 160, ry, CYAN, SZ, 500);
        glText(ctx, fmtVal(topName(stats, varname)) || 'NA', XO + xc * 160 + pw, ry, TEAL, SZ, Math.max(5, 155 - pw));
      }
    }
  }

  // ── Small panels (8 cols × 3 rows, starting at x=531) ──
  const sp = SMALL_PANELS[game] || [];
  let spr = 0;
  for (let y = 0; y < 3; y++) {
    for (let xc = 0; xc < 8; xc++, spr++) {
      const varname = sp[spr] || '';
      if (!varname) continue;
      const panX = (531 + xc * 161) + 4;
      const valX = 115 + 531 + xc * 161;
      glText(ctx, '#. ' + (STAT_LABEL[varname] || varname), panX, (20 + YO) + y * 330, CYAN, SZ, 155);
      const s     = stats[varname] || {};
      const names = s.name || [], vals = s.data || [];
      for (let i = 0; i < Math.min(15, names.length); i++) {
        const nm = names[i];
        if (!nm || nm === 'NA') break;
        const ry = (20 * (i + 2) + YO) + y * 330;
        glText(ctx, `${i + 1}. ${nm}`, panX, ry, CYAN, SZ, 110);
        glText(ctx, fmtVal(vals[i]),    valX, ry, TEAL, SZ, 500);
      }
    }
  }
}

// ─── gmData rendering ─────────────────────────────────────────────────────────

function renderGmData(ctx, { header, scoreboard, statData }) {
  const W = CW_GMDATA, H = CH;
  const SZ = 15;

  // ── Background ──
  renderBgGmData(ctx, W, H);

  // ── Map name header (centred, 32px "T2" → use Roboto Condensed) ──
  let mapDisplay = (header.mapName || '')
    .replace(/[!"#$%&'()*+,./:;<=>?@[\\\]^'{|}~\t\n\r0-9]/g, '')
    .replace(/-/g, ' ').replace(/_/g, ' ').trim().toUpperCase();

  ctx.font = `32px 'Roboto Condensed','Arial Narrow',sans-serif`;
  ctx.fillStyle = CYAN;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(mapDisplay + ' CTF', W / 2, 55);

  // ── Date (centred, 12px) ──
  ctx.font = FONT(12);
  ctx.fillText(header.date || '', W / 2, 85);
  ctx.textAlign = 'left';

  // ── Team score (y=100, 30px) ──
  const scoreParts = (header.score || '0 0').trim().split(/\s+/);
  const t1Score = parseInt(scoreParts[0], 10) || 0;
  const t2Score = parseInt(scoreParts[1], 10) || 0;
  const JL = 402; // justLeft from script (centred at new W/2=682)

  ctx.font = FONT(30);
  ctx.fillStyle = CYAN;
  glText(ctx, 'Storm',           JL,       100, CYAN, 30);
  glText(ctx, String(t1Score),   JL + 100, 100, CYAN, 30);
  glText(ctx, 'Inferno',         JL + 300, 100, CYAN, 30);
  glText(ctx, String(t2Score),   JL + 400, 100, CYAN, 30);

  // ── Scoreboard column headers (y=130) ──
  glText(ctx, 'Player', JL,       130, CYAN, SZ);
  glText(ctx, 'Score',  JL + 140, 130, CYAN, SZ);
  glText(ctx, 'Off',    JL + 180, 130, CYAN, SZ);
  glText(ctx, 'Def',    JL + 220, 130, CYAN, SZ);
  glText(ctx, 'Kills',  JL + 260, 130, CYAN, SZ);
  glText(ctx, 'Player', JL + 300, 130, CYAN, SZ);
  glText(ctx, 'Score',  JL + 440, 130, CYAN, SZ);
  glText(ctx, 'Off',    JL + 480, 130, CYAN, SZ);
  glText(ctx, 'Def',    JL + 520, 130, CYAN, SZ);
  glText(ctx, 'Kills',  JL + 560, 130, CYAN, SZ);

  // ── Scoreboard rows ──
  const t1 = scoreboard[1] || {}, t2 = scoreboard[2] || {};
  const t1n = t1.name || [], t2n = t2.name || [];
  const t1s = t1.score || [], t2s = t2.score || [];
  const t1o = t1.off   || [], t2o = t2.off   || [];
  const t1d = t1.def   || [], t2d = t2.def   || [];
  const t1k = t1.kills || [], t2k = t2.kills || [];
  const maxI = Math.min(32, Math.max(t1n.length, t2n.length));

  for (let i = 0; i < maxI; i++) {
    const ry = 150 + i * 20;
    if (i < t1n.length) {
      glText(ctx, `${i + 1}.${t1n[i] || ''}`, JL,       ry, CYAN, SZ, 130);
      glText(ctx, fmtVal(t1s[i]),              JL + 140, ry, CYAN, SZ);
      glText(ctx, fmtVal(t1o[i]),              JL + 180, ry, CYAN, SZ);
      glText(ctx, fmtVal(t1d[i]),              JL + 220, ry, CYAN, SZ);
      glText(ctx, fmtVal(t1k[i]),              JL + 260, ry, CYAN, SZ);
    }
    if (i < t2n.length) {
      glText(ctx, `${i + 1}.${t2n[i] || ''}`, JL + 300, ry, CYAN, SZ, 130);
      glText(ctx, fmtVal(t2s[i]),              JL + 440, ry, CYAN, SZ);
      glText(ctx, fmtVal(t2o[i]),              JL + 480, ry, CYAN, SZ);
      glText(ctx, fmtVal(t2d[i]),              JL + 520, ry, CYAN, SZ);
      glText(ctx, fmtVal(t2k[i]),              JL + 560, ry, CYAN, SZ);
    }
  }

  // ── Left stat panel (justLeft2=55, nameOffset=130, dataOffset=130) ──
  const JL2 = 55, JLT2 = 1000;
  const nameOff = 130, dataOff = 130;
  let lc = 0, lc2 = 0;

  function drawStatRow(justLeft, lineCount, label, key, team) {
    const ry = 150 + lineCount * 20;
    let v = justLeft;
    glText(ctx, label, v, ry, CYAN, SZ);
    v += nameOff;
    glText(ctx, gmTopName(statData, key, team), v, ry, CYAN, SZ, 100);
    v += dataOff;
    glText(ctx, fmtVal(gmTopVal(statData, key, team)), v, ry, CYAN, SZ);
  }

  GM_STAT_ROWS.forEach(({ label, key }) => {
    drawStatRow(JL2,  lc++,  label, key, 1);
    drawStatRow(JLT2, lc2++, label, key, 2);
  });

  // ── Weapon grid ──
  // WL matches the T2 script: 29 stat rows (lineCount 0..28, no ++ after last) then
  // two lineCount++ and wepLineCount = lineCount++ → WL = GM_STAT_ROWS.length + 1 = 30.
  // Weapon header at y = 150 + 30*20 = 750.
  const WL = GM_STAT_ROWS.length + 1;
  const kO = 50, kV = 160, mA = 200, mAV = 310, dmg = 355, dmgV = 465, dst = 510, dstV = 620;

  const wepHdrY = 150 + (WL + 2) * 20;
  glText(ctx, 'Weapons',     JL2,        wepHdrY, CYAN, SZ);
  glText(ctx, 'Kills',       JL2 + kO,   wepHdrY, CYAN, SZ);
  glText(ctx, 'MidAirs',     JL2 + mA,   wepHdrY, CYAN, SZ);
  glText(ctx, 'MA Distance', JL2 + dmg,  wepHdrY, CYAN, SZ);
  glText(ctx, 'Damage',      JL2 + dst,  wepHdrY, CYAN, SZ);

  const gmWeapons = [
    { name:'Blaster',   kills:'blasterKillsTG',  ma:'blasterMATG',  dist:'blasterMAHitDistMax', dmg:'blasterDmgTG'  },
    { name:'Plasma',    kills:'plasmaKillsTG',   ma:'plasmaMATG',   dist:'plasmaMAHitDistMax',  dmg:'plasmaDmgTG'   },
    { name:'Chaingun',  kills:'cgKillsTG',       ma:'cgMATG',       dist:'cgMAHitDistMax',      dmg:'cgDmgTG'       },
    { name:'Spinfusor', kills:'discKillsTG',     ma:'discMATG',     dist:'discMAHitDistMax',    dmg:'discDmgTG'     },
    { name:'Grenade',   kills:'grenadeKillsTG',  ma:'grenadeMATG',  dist:'grenadeMAHitDistMax', dmg:'grenadeDmgTG'  },
    { name:'Laser',     kills:'laserKillsTG',    ma:'laserMATG',    dist:'laserMAHitDistMax',   dmg:'laserDmgTG'    },
    { name:'Mortar',    kills:'mortarKillsTG',   ma:'mortarMATG',   dist:'mortarMAHitDistMax',  dmg:'mortarDmgTG'   },
    { name:'Missile',   kills:'missileKillsTG',  ma:'missileMATG',  dist:'missileMAHitDistMax', dmg:'missileDmgTG'  },
    { name:'Shock',     kills:'shockKillsTG',    ma:'shockMATG',    dist:'shockMAHitDistMax',   dmg:'shockDmgTG'    },
  ];

  gmWeapons.forEach(({ name, kills, ma, dist, dmg: dmgKey }, wi) => {
    const ry = 150 + (WL + 3 + wi) * 20;
    const t = 0; // team key 0 = overall/combined (matches $pugMapData[0,...] in the script)
    glText(ctx, name,                                        JL2,         ry, CYAN, SZ);
    glText(ctx, gmTopName(statData, kills, t)  || 'NA',      JL2 + kO,    ry, CYAN, SZ, 100);
    glText(ctx, fmtVal(gmTopVal (statData, kills, t))  || 'NA', JL2 + kV, ry, CYAN, SZ, 100);
    glText(ctx, gmTopName(statData, ma,    t)  || 'NA',      JL2 + mA,    ry, CYAN, SZ, 100);
    glText(ctx, fmtVal(gmTopVal (statData, ma,    t))  || 'NA', JL2 + mAV, ry, CYAN, SZ, 100);
    glText(ctx, gmTopName(statData, dist,  t)  || 'NA',      JL2 + dmg,   ry, CYAN, SZ, 100);
    glText(ctx, fmtVal(gmTopVal (statData, dist,  t))  || 'NA', JL2 + dmgV, ry, CYAN, SZ, 100);
    glText(ctx, gmTopName(statData, dmgKey, t) || 'NA',      JL2 + dst,   ry, CYAN, SZ, 100);
    glText(ctx, fmtVal(gmTopVal (statData, dmgKey, t)) || 'NA', JL2 + dstV, ry, CYAN, SZ, 100);
  });

  // ── Right-side dynamic stats panel (mirrors $imgStatList loop in z_dtStatsImgGen.cs) ──
  // Two columns: left at x=714, right at x=1034.  vehLineCount starts at WL+2 (two rows
  // below the weapon header) and advances once per pair.  All entries shown; zero-value entries display NA.
  const JL5 = 714, JL6 = 1014;
  const nameOff5 = 140, nameOff6 = 125; // bumped right by ~one space vs. nameOffset (+10)
  let vehLineCount = WL + 2;
  let vc = 0;

  for (const { label, key } of GM_IMG_STAT_LIST) {
    if (vc >= 28) break;
    const nm  = gmTopName(statData, key, 0);
    const val = gmTopVal (statData, key, 0);
    const ry = 150 + vehLineCount * 20;
    if (vc % 2 === 0) {
      let v = JL5;
      glText(ctx, label,                   v,                      ry, CYAN, SZ, 150);
      glText(ctx, nm  || 'NA',             v + nameOff5,           ry, TEAL, SZ, 100);
      glText(ctx, fmtVal(val) || 'NA',     v + nameOff5 + dataOff, ry, TEAL, SZ, 130);
    } else {
      let v = JL6;
      glText(ctx, label,                   v,                      ry, CYAN, SZ, 150);
      glText(ctx, nm  || 'NA',             v + nameOff6,           ry, TEAL, SZ, 100);
      glText(ctx, fmtVal(val) || 'NA',     v + nameOff6 + dataOff, ry, TEAL, SZ, 90);
      vehLineCount++;
    }
    vc++;
  }
  // If final entry landed in the left column (vc is odd), it still occupies its row.
  if (vc > 0 && vc % 2 !== 0) vehLineCount++;

  // ── Minor weapons section (below main weapons + 2 blank rows, mirrors lines 5939-6005) ──
  // wepLineCount after header(1) + 9 weapons(9) + 2 extra increments = WL + 12.
  // y-base offset is 140 (not 150) matching the original script.
  const minorWepLine = WL + 13;
  const JL3 = JL2 + 355; // justLeft3 = justLeft2 + 355 = 410
  const nameOff3 = nameOff - 15; // nameOffset + nameAdjust (-15) = 115

  function drawMinorWepRow(wl, leftLabel, leftKey, rightLabel, rightKey) {
    const ry = 140 + wl * 20;
    let v = JL2;
    glText(ctx, leftLabel,                        v,              ry, CYAN, SZ, 150);
    glText(ctx, gmTopName(statData, leftKey, 0),  v + nameOff3,   ry, TEAL, SZ, 130);
    glText(ctx, fmtVal(gmTopVal(statData, leftKey, 0)), v + nameOff3 + dataOff, ry, TEAL, SZ, 130);
    v = JL3;
    glText(ctx, rightLabel,                       v,              ry, CYAN, SZ, 150);
    glText(ctx, gmTopName(statData, rightKey, 0), v + nameOff3,   ry, TEAL, SZ, 130);
    glText(ctx, fmtVal(gmTopVal(statData, rightKey, 0)), v + nameOff3 + dataOff, ry, TEAL, SZ, 130);
  }

  // The T2 script has a copy-paste bug: 'Mine:' uses concussHitTG instead of mineKillsTG.
  // We replicate the original behaviour faithfully.
  drawMinorWepRow(minorWepLine,     'Hand Grenade:',    'hGrenadeKillsTG', 'Concuss Hits:',     'concussHitTG');
  drawMinorWepRow(minorWepLine + 1, 'Mine:',            'concussHitTG',    'Mine + Disc:',       'minePlusDiscTG');
  drawMinorWepRow(minorWepLine + 2, 'Satchel Charge:',  'satchelKillsTG',  'Sniper Head Shots:', 'laserHeadShotTG');
  drawMinorWepRow(minorWepLine + 3, 'ELF Usage:',       'elfShotsFiredTG', 'Shock Rear Hits:',   'shockRearShotTG');
}

// ─── Main entry ───────────────────────────────────────────────────────────────

const canvas      = document.getElementById('canvas');
const controls    = document.getElementById('controls');
const downloadBtn = document.getElementById('downloadBtn');
const statusEl    = document.getElementById('status');
const dropzone    = document.getElementById('dropzone');
const fileInput   = document.getElementById('fileInput');

// Default to lData canvas size; resized per file type when rendered
canvas.width  = CW_LDATA;
canvas.height = CH;
const ctx = canvas.getContext('2d');

// Scale the display canvas down so it fits the viewport
function scaleCanvas() {
  const maxW  = window.innerWidth - 32;
  const scale = Math.min(1, maxW / canvas.width);
  canvas.style.width  = `${Math.floor(canvas.width  * scale)}px`;
  canvas.style.height = `${Math.floor(canvas.height * scale)}px`;
}
scaleCanvas();
window.addEventListener('resize', scaleCanvas);

function processFile(file) {
  statusEl.textContent = `Parsing: ${file.name}…`;
  const reader = new FileReader();
  reader.onload = e => {
    const content = e.target.result;
    try {
      const type = detectType(file.name);
      let parsed;
      if (type === 'gmData') {
        parsed = parseGmData(content);
        if (!parsed) throw new Error('Could not parse gmData file.');
      } else {
        // lData or unknown – try lData
        parsed = parseLData(content, file.name.split('/').pop().split('\\').pop());
      }

      document.fonts.ready.then(() => {
        // Resize canvas to match the script's output dimensions
        const W = type === 'gmData' ? CW_GMDATA : CW_LDATA;
        if (canvas.width !== W || canvas.height !== CH) {
          canvas.width  = W;
          canvas.height = CH;
        }
        ctx.clearRect(0, 0, W, CH);
        if (type === 'gmData') {
          renderGmData(ctx, parsed);
        } else {
          renderLData(ctx, parsed);
        }
        scaleCanvas();
        controls.classList.add('visible');
        statusEl.textContent = `Ready · ${file.name}`;
      });
    } catch (err) {
      statusEl.textContent = `Error: ${err.message}`;
      console.error(err);
    }
  };
  reader.onerror = () => { statusEl.textContent = 'Error reading file.'; };
  reader.readAsText(file);
}

// Drag and drop
dropzone.addEventListener('dragover', e => {
  e.preventDefault();
  dropzone.classList.add('drag-over');
});
dropzone.addEventListener('dragleave',  () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('dragenter', e => e.preventDefault());
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
});

// Click to browse
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) processFile(file);
});

// Download
downloadBtn.addEventListener('click', () => {
  const a = document.createElement('a');
  a.download = 'leaderboard.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
});
</script>
</body>
</html>
