<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server List &ndash; Play Tribes 2</title>

  <!-- Favicons -->
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
  <link rel="manifest" href="/favicon/site.webmanifest">

  <!-- Meta -->
  <meta name="theme-color" content="#03e0a3">
  <meta name="title" content="Play Tribes 2 &ndash; Server List">
  <meta property="og:type"       content="website">
  <meta property="og:url"        content="https://playt2.com/">
  <meta property="og:site_name"  content="Play Tribes 2">
  <meta property="og:title"      content="Play Tribes 2 &ndash; Server List">
  <meta property="og:image"      content="https://www.playt2.com/images/meta.png">
  <meta property="twitter:card"  content="summary_large_image">
  <meta property="twitter:url"   content="https://playt2.com/">
  <meta property="twitter:title" content="Play Tribes 2 &ndash; Server List">
  <meta property="twitter:image" content="https://www.playt2.com/images/meta.png">

  <link rel="stylesheet" href="assets/css/serverlist.css" />
  <link rel="stylesheet" href="assets/css/fontawesome-all.min.css" />

  <style>
    /*  Page layout  */
    .servers-page {
      padding-top: 62px; /* navbar height */
      min-height: 100vh;
    }

    .servers-hero {
      background: linear-gradient(180deg, rgba(0,255,136,0.05) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
      padding: 3rem 0 2.5rem;
    }

    .servers-hero-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .servers-hero h1 {
      font-family: var(--font-h);
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #fff;
      line-height: 1.1;
    }

    .servers-hero h1 span { color: var(--accent); }

    .servers-meta {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .servers-stat {
      text-align: right;
    }
    .servers-stat .s-num {
      display: block;
      font-family: var(--font-h);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }
    .servers-stat .s-lbl {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    /*  Toolbar  */
    .servers-toolbar {
      padding: 1.25rem 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.45rem 0.9rem;
      flex: 1;
      max-width: 360px;
      transition: border-color 0.2s;
    }
    .search-box:focus-within { border-color: rgba(0,255,136,0.4); }
    .search-box i { color: var(--muted); font-size: 0.85rem; }
    .search-box input {
      background: none;
      border: none;
      outline: none;
      font-family: var(--font-b);
      font-size: 0.88rem;
      color: var(--text);
      width: 100%;
    }
    .search-box input::placeholder { color: var(--muted); }

    .refresh-btn {
      display: inline-flex;
      align-items: center;
      gap: 0rem 0rem 0rem 0rem;
      font-family: var(--font-h);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.5rem 1.2rem 0.5rem 1.2rem ;
      border: 1px solid rgba(0,255,136,0.25);
      border-radius: 6px;
      background: rgba(0,255,136,0.06);
      color: var(--accent);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .refresh-btn:hover { background: rgba(0,255,136,0.12); border-color: rgba(0,255,136,0.45); }

    .status-dot {
      width: 0px; height: 0px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      animation: blink 1.4s infinite;
    }
    .status-dot.error { background: var(--red); animation: none; }

    /*  Table  */
    .servers-table-wrap {
      padding: 2rem 0 4rem;
    }

    .server-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .server-table thead th {
      font-family: var(--font-h);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      user-select: none;
    }
    .server-table thead th.sortable { cursor: pointer; }
    .server-table thead th.sortable:hover { color: var(--accent); }
    .server-table thead th .sort-icon { margin-left: 0.3rem; opacity: 0.4; font-size: 0.65rem; }
    .server-table thead th.sorted .sort-icon { opacity: 1; color: var(--accent); }

    .server-table tbody tr {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .server-table tbody tr:hover { background: var(--bg2); }
    .server-table tbody tr.selected { background: rgba(0,255,136,0.06); }
    .server-table tbody tr.selected td:first-child {
      box-shadow: inset 3px 0 0 var(--accent);
    }

    .server-table td {
      padding: 0.85rem 1rem;
      color: var(--text);
      vertical-align: middle;
    }

    .td-name {
      font-weight: 500;
      color: #fff;
    }

    .td-players { font-family: var(--font-h); font-weight: 700; }
    .td-players .p-cur { color: var(--text); }
    .td-players .p-div { color: var(--muted); }
    .td-players .p-max { color: var(--text); }
    .td-players .p-bots { color: var(--muted); font-size: 0.78rem; }

    .badge {
      display: inline-block;
      font-family: var(--font-h);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.18rem 0.55rem;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted);
      background: rgba(255,255,255,0.04);
    }
    .badge-lctf  { border-color: rgba(195, 0, 255, 0.25); color: rgba(201, 74, 240, 0.774);  background: rgba(129, 4, 175, 0.06);  }
    .badge-ctf  { border-color: rgba(0,255,136,0.25); color: rgba(0, 255, 136, 0.975);  background: rgba(0,255,136,0.06);  }
    .badge-deathmatch, .badge-dm { border-color: rgba(255,60,60,0.25);  color: #ff6464; background: rgba(255,60,60,0.06); }
    .badge-siege { border-color: rgba(255,200,50,0.25); color: #ffc832; background: rgba(255,200,50,0.06); }
    .badge-lak { border-color: rgba(255,200,50,0.25); color: #ffc832; background: rgba(255,200,50,0.06); }
    .badge-tr2 { border-color: rgba(8, 8, 208, 0.432); color: #4a32ff; background: rgba(6, 43, 230, 0.06); }
    .badge-duel { border-color: rgba(208, 8, 8, 0.432); color: #ff3232; background: rgba(230, 6, 6, 0.06); }

    .no-results {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      font-family: var(--font-h);
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .loading-row td {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
    }

    /*  Modal  */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }

    .modal-box {
      background: var(--bg2);
      border: 1px solid rgba(0,255,136,0.2);
      border-radius: 14px;
      padding: 2rem;
      width: 90%;
      max-width: 700px;
      max-height: 85vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 0 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,255,136,0.06);
    }

    .modal-close-btn {
      position: absolute;
      top: 1rem; right: 1rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: color 0.2s, background 0.2s;
    }
    .modal-close-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }

    .modal-server-name {
      font-family: var(--font-h);
      font-size: 1.5rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 0.4rem;
      padding-right: 2.5rem;
    }

    .modal-desc {
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
      line-height: 1.7;
    }

    .modal-divider {
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }

    .modal-players-label {
      font-family: var(--font-h);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .modal-teams {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
    }

    .modal-team {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
    }

    .modal-team-name {
      font-family: var(--font-h);
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 0.6rem;
    }

    .modal-player {
      font-size: 0.82rem;
      color: var(--text);
      padding: 0.2rem 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
    }
    .modal-player:last-child { border-bottom: none; }
    .modal-player .p-score { color: var(--muted); font-size: 0.76rem; }

    .modal-no-players {
      font-size: 0.88rem;
      color: var(--muted);
    }

    /*  Responsive  */
    @media (max-width: 700px) {
      .servers-meta { flex-direction: row; }
      .servers-stat { text-align: left; }
      .server-table td:nth-child(4),
      .server-table th:nth-child(4),
      .server-table td:nth-child(5),
      .server-table th:nth-child(5),
      .server-table td:nth-child(6),
      .server-table th:nth-child(6) { display: none; }
    }
  </style>
</head>

<!-- Navbar -->
<nav class="navbar">
  <a href="index.html" class="navbar-brand">
    <img src="images/avatar.svg" alt="T2 logo" />
    Play&nbsp;Tribes&nbsp;2
  </a>

  <ul class="navbar-links" id="navLinks">
	<a href="index.html">Home</a>

  <div class="navbar-actions">
    <a href="discord.html" class="btn btn-ghost-nav">Discord</a>

<div class="servers-page">

  <!-- Hero strip -->
  <div class="servers-hero">

      <div class="servers-hero-inner">

          <span class="tag">Live Data</span>

            <th class="sortable sorted" data-col="players">Players <i class="fas fa-sort sort-icon"></i></th>

<script>
  /*  Nav toggle  */
  document.getElementById('navToggle').addEventListener('click', function() {
    document.getElementById('navLinks').classList.toggle('open');
  });

  /*  Server list  */
  var allServers = [];
  var sortCol    = 'players';
  var sortDir    = -1; // -1 = desc

  function escHtml(s) {
    return String(s || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function modeBadge(mode) {
    if (!mode) return '';
    var cls = 'badge';
    var m   = mode.toLowerCase();
    if (m.includes('lctf')) cls += ' badge-lctf';
    else if (m.includes('capture the flag') || m.includes(' ctf')) cls += ' badge-ctf';
    else if (m.includes('death') || m.includes(' dm')) cls += ' badge-deathmatch';
    else if (m.includes('siege'))  cls += ' badge-siege';
    else if (m.includes('lak') || m.includes(' lak')) cls += ' badge-lak';
    else if (m.includes('team rabbit 2') || m.includes(' team rabbit 2')) cls += ' badge-tr2';
    else if (m.includes('duel mod') || m.includes(' duel mod')) cls += ' badge-duel';
    return '<span class="' + cls + '">' + escHtml(mode) + '</span>';
  }

  function renderTable(servers) {
    var tbody  = document.getElementById('serverTbody');
    var filter = document.getElementById('searchInput').value.toLowerCase();

    var visible = servers.filter(function(s) {
      if (!filter) return true;
      return (s.info_hostname || '').toLowerCase().includes(filter) ||
             (s.info_map      || '').toLowerCase().includes(filter) ||
             (s.info_maptype  || '').toLowerCase().includes(filter);
    });

    if (visible.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="no-results">No servers match your filter</td></tr>';
      return;
    }

    var html = '';
    for (var i = 0; i < visible.length; i++) {
      var s   = visible[i];
      var sid = s._sid;
      var cur = parseInt(s.num_players || 0, 10);
      var max = (s.info_flags && s.info_flags.max_players) ? s.info_flags.max_players : '?';
      var bots = parseInt(s.num_bots || 0, 10);
      html +=
        '<tr data-sid="' + escHtml(sid) + '">' +
        '<td class="td-name">'  + escHtml(s.info_hostname) + '</td>' +
        '<td class="td-players"><span class="p-cur">' + cur + '</span>' +
          '<span class="p-div">/</span><span class="p-max">' + max + '</span>' +
          (bots ? '<span class="p-bots"> +' + bots + 'b</span>' : '') +
        '</td>' +
        '<td>' + escHtml(s.info_map) + '</td>' +
        '<td>' + modeBadge(s.info_maptype) + '</td>' +
        '<td><span style="color:var(--muted)">' + escHtml(s.info_mod) + '</span></td>' +
        '<td><code style="font-size:0.78rem;color:var(--muted)">' + escHtml(s.s_ipa) + '</code></td>' +
        '</tr>';
    }
    tbody.innerHTML = html;

    // Attach row-click for modal
    tbody.querySelectorAll('tr[data-sid]').forEach(function(row) {
      row.addEventListener('click', function() {
        tbody.querySelectorAll('tr').forEach(function(r){ r.classList.remove('selected'); });
        row.classList.add('selected');
        openModal(row.getAttribute('data-sid'));
      });
    });
  }

  function sortServers(servers, col, dir) {
    return servers.slice().sort(function(a, b) {
      if (col === 'players') {
        var aBad =
          a.info_hostname.includes('TRIUMPH BotAbuse 300Maps') ||
          parseInt(a.num_bots || 0, 10) > 0;

        var bBad =
          b.info_hostname.includes('TRIUMPH BotAbuse 300Maps') ||
          parseInt(b.num_bots || 0, 10) > 0;

        // Push bad/bot servers to the end
        if (aBad && !bBad) return 1;
        if (!aBad && bBad) return -1;

        // Otherwise sort by human players descending
        var aHumans =
          parseInt(a.num_players || 0, 10) -
          parseInt(a.num_bots || 0, 10);

        var bHumans =
          parseInt(b.num_players || 0, 10) -
          parseInt(b.num_bots || 0, 10);

        return bHumans - aHumans;
      }
      var av = (a.info_hostname || '').toLowerCase();
      var bv = (b.info_hostname || '').toLowerCase();
      return dir * av.localeCompare(bv);
    });
  }

  function openModal(sid) {
    var s = allServers.find(function(x){ return x._sid === sid; });
    if (!s) return;

    document.getElementById('modalName').textContent  = s.info_hostname || 'Unknown Server';
    document.getElementById('modalDesc').textContent  = s.info_desc     || 'No description available.';

    var pContainer = document.getElementById('modalPlayers');
    pContainer.innerHTML = '';

    if (s.info_players instanceof Object) {
      var teams = Object.entries(s.info_players)
        .filter(function(e){ return e[0] !== 'name' && e[0] !== 'score'; });

      if (teams.length === 0) {
        pContainer.innerHTML = '<p class="modal-no-players">No players online.</p>';
      } else {
        teams.forEach(function(entry) {
          var team = entry[1];
          var teamEl = document.createElement('div');
          teamEl.className = 'modal-team';
          var teamName  = escHtml(team.name  || 'Team');
          var teamScore = team.score !== undefined ? escHtml(String(team.score)) : '&mdash;';
          var rows = Object.entries(team)
            .filter(function(e){ return !isNaN(e[0]); })
            .map(function(e) {
              var p = e[1];
              return '<div class="modal-player"><span>' + escHtml(p.name||'?') + '</span>' +
                     '<span class="p-score">' + (p.score !== undefined ? escHtml(String(p.score)) : '&mdash;') + '</span></div>';
            }).join('');
          teamEl.innerHTML = '<div class="modal-team-name">' + teamName + ' &mdash; Score: ' + teamScore + '</div>' + rows;
          pContainer.appendChild(teamEl);
        });
      }
    } else {
      pContainer.innerHTML = '<p class="modal-no-players">No player information available.</p>';
    }

    document.getElementById('serverModal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('serverModal').classList.remove('open');
  }
  document.getElementById('closeModal').addEventListener('click', closeModal);
  document.getElementById('serverModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });

  /*  Fetch  */
  function setStatus(ok) {
    var dot = document.getElementById('statusDot');
    dot.classList.toggle('error', !ok);
  }

  function fetchServers() {
    setStatus(true);
    fetch('https://www.tribesnext.com/list.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        allServers = [];
        var totalPlayers = 0;

        for (var sid in data) {
          if (!Object.prototype.hasOwnProperty.call(data, sid)) continue;
          var s    = data[sid];
          s._sid   = sid;
          allServers.push(s);
          totalPlayers += parseInt(s.num_players || 0, 10);
        }

        document.getElementById('statServers').textContent = allServers.length;
        document.getElementById('statPlayers').textContent = totalPlayers;

        var sorted = sortServers(allServers, sortCol, sortDir);
        renderTable(sorted);

        var now = new Date();
        document.getElementById('lastUpdated').textContent =
          'Updated ' + now.toLocaleTimeString();
        setStatus(true);
      })
      .catch(function(err) {
        console.error('Server list error:', err);
        setStatus(false);
        document.getElementById('serverTbody').innerHTML =
          '<tr><td colspan="6" class="no-results">Could not load server list</td></tr>';
      });
  }

  /*  Sort headers  */
  document.querySelectorAll('.server-table th.sortable').forEach(function(th) {
    th.addEventListener('click', function() {
      var col = this.getAttribute('data-col');
      if (sortCol === col) { sortDir *= -1; }
      else                 { sortCol = col; sortDir = -1; }
      document.querySelectorAll('.server-table th').forEach(function(h){ h.classList.remove('sorted'); });
      this.classList.add('sorted');
      renderTable(sortServers(allServers, sortCol, sortDir));
    });
  });

  /*  Search filter  */
  document.getElementById('searchInput').addEventListener('input', function() {
    renderTable(sortServers(allServers, sortCol, sortDir));
  });

  /*  Refresh btn  */
  document.getElementById('refreshBtn').addEventListener('click', fetchServers);

  /*  Init  */
  document.addEventListener('DOMContentLoaded', function() {
    fetchServers();
    setInterval(fetchServers, 60000);
  });
</script>

</body>
</html>
